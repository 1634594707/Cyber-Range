# ---- Cyber Range Nginx 配置 ----
# 适用: Debian 12 / Nginx 1.26+
# 位置: /etc/nginx/sites-available/ctfd

# ---- 限流区域 ----
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

# ---- 上游服务器 ----
upstream ctfd_backend {
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ---- HTTPS 主站 ----
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # 修改为实际域名

    # SSL 配置
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- 安全头 ----
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ---- 日志 ----
    access_log /var/log/nginx/ctfd_access.log combined buffer=16k;
    error_log  /var/log/nginx/ctfd_error.log warn;

    # ---- 全局限流 ----
    limit_req zone=api_limit burst=50 nodelay;
    limit_conn per_ip 30;

    # ---- 静态资源（长期缓存） ----
    location /themes/ {
        proxy_pass http://ctfd_backend;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /files/ {
        proxy_pass http://ctfd_backend;
        proxy_set_header Host $host;
        expires 1h;
        add_header Cache-Control "public";
    }

    # ---- 登录接口（严格限流） ----
    location /login {
        limit_req zone=login_limit burst=3 nodelay;
        proxy_pass http://ctfd_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- API 路由 ----
    location /api/ {
        proxy_pass http://ctfd_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- 管理后台（IP 白名单） ----
    location ~ ^/(admin|setup) {
        # 仅允许内网和办公室 IP
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        # 添加你的办公室 IP:
        # allow YOUR_OFFICE_IP;
        deny all;

        proxy_pass http://ctfd_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ---- 通用代理 ----
    location / {
        proxy_pass http://ctfd_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 50M;
    }

    # ---- 安全：隐藏 Nginx 版本 ----
    server_tokens off;

    # ---- 安全：阻止常见攻击路径 ----
    location ~* \.(git|svn|hg|bzr)$ { deny all; return 404; }
    location ~* \.(env|sql|log|backup|bak|old|swp)$ { deny all; return 404; }
    location = /wp-admin { return 404; }
    location = /phpmyadmin { return 404; }
    location = /.env { return 404; }
}
